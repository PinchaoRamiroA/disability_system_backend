definitions:
  disability_system_backend_internal_modules_auth_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  disability_system_backend_internal_modules_auth_dto.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/disability_system_backend_internal_modules_auth_dto.UserResponse'
    type: object
  disability_system_backend_internal_modules_auth_dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  disability_system_backend_internal_modules_auth_dto.RegisterRequest:
    properties:
      direccion:
        type: string
      email:
        type: string
      nombre:
        maxLength: 150
        minLength: 2
        type: string
      numero_celular:
        type: string
      numero_documento:
        minLength: 5
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - nombre
    - numero_documento
    - password
    type: object
  disability_system_backend_internal_modules_auth_dto.RoleResponse:
    properties:
      id:
        type: integer
      nombre:
        type: string
      permisos:
        items:
          type: string
        type: array
    type: object
  disability_system_backend_internal_modules_auth_dto.TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  disability_system_backend_internal_modules_auth_dto.UserResponse:
    properties:
      correo:
        type: string
      created_at:
        type: string
      direccion:
        type: string
      estado:
        type: boolean
      id:
        type: integer
      nombre:
        type: string
      numero_celular:
        type: string
      numero_documento:
        type: string
      rol:
        $ref: '#/definitions/disability_system_backend_internal_modules_auth_dto.RoleResponse'
    type: object
  disability_system_backend_internal_modules_cobros_dto.ActualizarPagoRequest:
    properties:
      descripcion:
        type: string
      estado_pago:
        type: string
      fecha_pago:
        type: string
      id_entidad:
        type: integer
      periodo_contable:
        type: string
      tipo_pago:
        type: string
      valor:
        type: string
    type: object
  disability_system_backend_internal_modules_cobros_dto.ActualizarSeguimientoRequest:
    properties:
      descripcion:
        type: string
      resultado:
        type: string
      tipo_seguimiento:
        type: string
    type: object
  disability_system_backend_internal_modules_cobros_dto.ConciliarPagoRequest:
    properties:
      conciliado:
        type: boolean
      descripcion:
        type: string
      estado_pago:
        type: string
    type: object
  disability_system_backend_internal_modules_cobros_dto.CrearPagoRequest:
    properties:
      descripcion:
        type: string
      estado_pago:
        type: string
      fecha_pago:
        type: string
      id_entidad:
        type: integer
      id_incapacidad:
        type: integer
      periodo_contable:
        type: string
      tipo_pago:
        type: string
      valor:
        type: string
    required:
    - fecha_pago
    - id_entidad
    - id_incapacidad
    - tipo_pago
    - valor
    type: object
  disability_system_backend_internal_modules_cobros_dto.CrearSeguimientoRequest:
    properties:
      descripcion:
        type: string
      id_incapacidad:
        type: integer
      resultado:
        type: string
      tipo_seguimiento:
        type: string
    required:
    - id_incapacidad
    - tipo_seguimiento
    type: object
  disability_system_backend_internal_modules_incapacidades_dto.ActualizarIncapacidadRequest:
    properties:
      canal_recepcion:
        type: string
      fecha_fin:
        type: string
      fecha_inicio:
        type: string
      fecha_pago:
        type: string
      fecha_radicacion:
        type: string
      id_entidad:
        type: integer
      id_tipo:
        type: integer
      id_usuario:
        type: integer
      observaciones:
        type: string
      origen:
        type: string
      titulo:
        type: string
    type: object
  disability_system_backend_internal_modules_incapacidades_dto.CambiarEstadoRequest:
    properties:
      id_estado:
        type: integer
      observaciones:
        type: string
    required:
    - id_estado
    type: object
  disability_system_backend_internal_modules_incapacidades_dto.CrearIncapacidadRequest:
    properties:
      canal_recepcion:
        type: string
      fecha_fin:
        type: string
      fecha_inicio:
        type: string
      fecha_pago:
        type: string
      fecha_radicacion:
        type: string
      id_entidad:
        type: integer
      id_estado:
        type: integer
      id_tipo:
        type: integer
      id_usuario:
        type: integer
      observaciones:
        type: string
      origen:
        type: string
      titulo:
        type: string
    required:
    - fecha_inicio
    - id_entidad
    - id_tipo
    - origen
    - titulo
    type: object
  disability_system_backend_internal_modules_incapacidades_dto.MarcarTranscripcionRequest:
    properties:
      estado:
        enum:
        - en_proceso
        - completado
        type: string
    required:
    - estado
    type: object
  disability_system_backend_internal_modules_incapacidades_dto.SubirDocumentoRequest:
    properties:
      formato:
        type: string
      id_incapacidad:
        type: integer
      nombre:
        type: string
      tipo:
        type: string
      url:
        type: string
    required:
    - formato
    - id_incapacidad
    - nombre
    - tipo
    - url
    type: object
  disability_system_backend_internal_modules_incapacidades_dto.TranscribirIncapacidadRequest:
    properties:
      observaciones_transcripcion:
        type: string
    type: object
  disability_system_backend_internal_modules_incapacidades_dto.ValidarDocumentoRequest:
    properties:
      comentario:
        type: string
      estado:
        type: string
    required:
    - estado
    type: object
  disability_system_backend_internal_modules_notificaciones_dto.CrearNotificacionRequest:
    properties:
      id_incapacidad:
        type: integer
      id_usuario:
        type: integer
      mensaje:
        type: string
      tipo_notificacion:
        type: string
    required:
    - id_usuario
    - mensaje
    - tipo_notificacion
    type: object
  disability_system_backend_internal_modules_reportes_dto.GenerarReporteRequest:
    properties:
      fecha_fin:
        type: string
      fecha_inicio:
        type: string
      id_empleado:
        type: integer
      id_entidad:
        type: integer
      id_estado:
        type: integer
      id_tipo:
        type: integer
      origen:
        type: string
      periodo:
        type: string
      tipo:
        type: string
    required:
    - tipo
    type: object
  disability_system_backend_internal_modules_usuarios_dto.ActualizarUsuarioRequest:
    properties:
      correo:
        maxLength: 150
        type: string
      direccion:
        type: string
      id_rol:
        type: integer
      nombre:
        maxLength: 150
        minLength: 3
        type: string
      numero_celular:
        type: string
    required:
    - correo
    - id_rol
    - nombre
    type: object
  disability_system_backend_internal_modules_usuarios_dto.AsignarRolRequest:
    properties:
      id_rol:
        type: integer
    required:
    - id_rol
    type: object
  disability_system_backend_internal_modules_usuarios_dto.CambiarEstadoUsuarioRequest:
    properties:
      estado:
        type: boolean
    type: object
  disability_system_backend_internal_modules_usuarios_dto.CambiarPasswordRequest:
    properties:
      password_actual:
        type: string
      password_nuevo:
        maxLength: 100
        minLength: 8
        type: string
    required:
    - password_actual
    - password_nuevo
    type: object
  disability_system_backend_internal_modules_usuarios_dto.CrearUsuarioRequest:
    properties:
      correo:
        maxLength: 150
        type: string
      direccion:
        type: string
      id_rol:
        type: integer
      nombre:
        maxLength: 150
        minLength: 3
        type: string
      numero_acudiente:
        type: string
      numero_celular:
        type: string
      numero_documento:
        maxLength: 30
        minLength: 5
        type: string
      password:
        maxLength: 100
        minLength: 8
        type: string
    required:
    - correo
    - id_rol
    - nombre
    - numero_documento
    - password
    type: object
  disability_system_backend_internal_shared_response.ErrorInfo:
    properties:
      code:
        type: string
      details: {}
    type: object
  disability_system_backend_internal_shared_response.Response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/disability_system_backend_internal_shared_response.ErrorInfo'
      message:
        type: string
      success:
        type: boolean
    type: object
basePath: /api/v1
info:
  contact: {}
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Autentica un usuario y devuelve tokens de acceso
      parameters:
      - description: Credenciales de login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/disability_system_backend_internal_modules_auth_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/disability_system_backend_internal_shared_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/disability_system_backend_internal_modules_auth_dto.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/disability_system_backend_internal_shared_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/disability_system_backend_internal_shared_response.Response'
      summary: Iniciar sesión
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Obtiene nuevos tokens usando un refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/disability_system_backend_internal_modules_auth_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/disability_system_backend_internal_shared_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/disability_system_backend_internal_modules_auth_dto.TokenResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/disability_system_backend_internal_shared_response.Response'
      summary: Renovar token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Crea un nuevo usuario en el sistema
      parameters:
      - description: Datos del usuario
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/disability_system_backend_internal_modules_auth_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/disability_system_backend_internal_shared_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/disability_system_backend_internal_modules_auth_dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/disability_system_backend_internal_shared_response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/disability_system_backend_internal_shared_response.Response'
      summary: Registrar usuario
      tags:
      - auth
  /cartera/alertas-vencimiento:
    get:
      consumes:
      - application/json
      description: Lista las alertas de vencimiento de pagos
      parameters:
      - default: 0
        description: Días mínimos de vencimiento
        in: query
        name: dias_minimos
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Obtener alertas de vencimiento
      tags:
      - cartera
  /cartera/estadisticas:
    get:
      consumes:
      - application/json
      description: Obtiene estadísticas generales de la cartera de cobros
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Obtener estadísticas de cartera
      tags:
      - cartera
  /cartera/incapacidades/{id}/proximo-estado:
    get:
      consumes:
      - application/json
      description: Sugiere el próximo estado basado en acciones de cobro
      parameters:
      - description: ID de la incapacidad
        in: path
        name: id
        required: true
        type: integer
      - description: Acción a realizar
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Obtener próximo estado de incapacidad
      tags:
      - cartera
  /cartera/resumen-entidad:
    get:
      consumes:
      - application/json
      description: Obtiene el resumen de cobros agrupado por entidad
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Obtener resumen por entidad
      tags:
      - cartera
  /cartera/vencida:
    get:
      consumes:
      - application/json
      description: Lista los pagos vencidos
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Obtener cartera vencida
      tags:
      - cartera
  /catalogos/estados-documento:
    get:
      consumes:
      - application/json
      description: Lista todos los estados de documento
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Listar estados de documento
      tags:
      - catalogos
  /catalogos/tipos-documento:
    get:
      consumes:
      - application/json
      description: Lista todos los tipos de documento
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Listar tipos de documento
      tags:
      - catalogos
  /catalogos/tipos-pago:
    get:
      consumes:
      - application/json
      description: Lista todos los tipos de pago
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Listar tipos de pago
      tags:
      - catalogos
  /cobros/pagos:
    get:
      consumes:
      - application/json
      description: Lista los pagos con filtros
      parameters:
      - description: Filtrar por incapacidad
        in: query
        name: id_incapacidad
        type: integer
      - description: Filtrar por entidad
        in: query
        name: id_entidad
        type: integer
      - description: Filtrar por tipo
        in: query
        name: tipo_pago
        type: string
      - description: Filtrar por estado
        in: query
        name: estado_pago
        type: string
      - description: Filtrar por conciliación
        in: query
        name: conciliado
        type: boolean
      - default: 1
        description: Página
        in: query
        name: page
        type: integer
      - default: 20
        description: Límite
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Listar pagos
      tags:
      - cobros
    post:
      consumes:
      - application/json
      description: Registra un nuevo pago de EPS/ARL
      parameters:
      - description: Datos del pago
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/disability_system_backend_internal_modules_cobros_dto.CrearPagoRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Registrar pago
      tags:
      - cobros
  /cobros/pagos/{id}:
