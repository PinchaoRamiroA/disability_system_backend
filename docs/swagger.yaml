      consumes:
      - application/json
      description: Elimina un pago del sistema
      parameters:
      - description: ID del pago
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Eliminar pago
      tags:
      - cobros
    get:
      consumes:
      - application/json
      description: Obtiene los detalles de un pago específico
      parameters:
      - description: ID del pago
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Obtener pago por ID
      tags:
      - cobros
    put:
      consumes:
      - application/json
      description: Actualiza los datos de un pago
      parameters:
      - description: ID del pago
        in: path
        name: id
        required: true
        type: integer
      - description: Datos del pago
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/disability_system_backend_internal_modules_cobros_dto.ActualizarPagoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Actualizar pago
      tags:
      - cobros
  /cobros/pagos/{id}/conciliar:
    patch:
      consumes:
      - application/json
      description: Concilia un pago para contabilidad
      parameters:
      - description: ID del pago
        in: path
        name: id
        required: true
        type: integer
      - description: Datos de conciliación
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/disability_system_backend_internal_modules_cobros_dto.ConciliarPagoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Conciliar pago
      tags:
      - cobros
  /cobros/seguimientos:
    get:
      consumes:
      - application/json
      description: Lista los seguimientos de cobro
      parameters:
      - description: Filtrar por incapacidad
        in: query
        name: id_incapacidad
        type: integer
      - description: Filtrar por tipo
        in: query
        name: tipo_seguimiento
        type: string
      - default: 1
        description: Página
        in: query
        name: page
        type: integer
      - default: 20
        description: Límite
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Listar seguimientos
      tags:
      - cobros
    post:
      consumes:
      - application/json
      description: Registra un seguimiento de cobro persuasivo o jurídico
      parameters:
      - description: Datos del seguimiento
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/disability_system_backend_internal_modules_cobros_dto.CrearSeguimientoRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Registrar seguimiento de cobro
      tags:
      - cobros
  /cobros/seguimientos/{id}:
    get:
